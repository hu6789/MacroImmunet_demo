# path: receptors/ACE2_v1.yaml
id: ACE2_v1
type: receptor
display_name: "ACE2 (SARS-like entry receptor)"
ligand_field: "Field_Antigen_Density"
description: >
  ACE2-like receptor used by SARS-like toy antigen for cell entry.
  Provides a binding/entry score to downstream behavior antigen_invasion_v1.

default_params:
  count: 600
  # Units: k_on [1/(copies·tick)], k_off [1/tick]
  k_on: 0.025
  k_off: 0.008
  mean_bound_time_ticks: 2
  activation_threshold_nbound: 1
  integration_window_ticks: 4
  receptor_entry_modifier: 1.0    # cell-intrinsic modifier (e.g., expression level factor)
  protease_dependency_sensitivity: 1.0
  refractory_ticks: 6

downstream:
  on_activation:
    - behavior: "antigen_invasion_v1"
      payload: {}

notes:
  - "Receptor should expose helper compute_binding(cell, antigen) to provide entry/binding score for behaviors."
  - "Per-cell overrides (expression) should be implemented via cell.receptors[ACE2_v1].count or receptor.instance_params."
optional: false
provenance:
  author: your_name
  created: 2025-11-05
version: 1

