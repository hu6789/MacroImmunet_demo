id: CXCR3_v1
type: receptor
display_name: "CXCR3 family receptor"
ligand_field: "Field_CXCL10"
description: "Chemokine receptor on effector T cells for recruitment to inflamed tissue."

default_params:
  count: 60
  # units: k_on [1/(au·tick)], k_off [1/tick]
  k_on: 0.015
  k_off: 0.03
  activation_threshold_nbound: 1
  integration_window_ticks: 8
  chemotactic_sensitivity: 0.8
  refractory_ticks: 4

downstream:
  on_activation:
    - behavior: "move_toward_v1"
      payload:
        mode: "chemotaxis"
        chemokine: "Field_CXCL10"
        speed_units_per_tick: 1.0

notes:
  - "Used by Th1/CTL for tissue recruitment; integrates local IFN->CXCL10 signal cascade."
  - "Emission should be a move intent; engine resolves reservations and performs the physical move."
optional: false
provenance:
  created: 2025-11-05
version: 1

