# High-dose exposure: strong seeding, replication and influx to provoke stronger immune responses
random_seed: 7

space:
  w: 12
  h: 6
  space_id: Lung_Tissue_2D
  seed:
    - { field: Field_Antigen_Density, coord: [3, 2], value: 50.0 }
    - { field: Field_Antigen_Density, coord: [9, 1], value: 30.0 }

masters:
  antigen_master:
    seeds:
      - { tick: 0, coord: [3,2], amount: 50.0 }
      - { tick: 0, coord: [9,1], amount: 30.0 }
    continuous_influx_rate: 0.5
    replication_rate: 0.06
    diffusion_rate: 0.25
    decay: 0.99
    attempt_infect_threshold: 0.5
    attempt_infect_strength_scale: 1.5
    replication_cap: 1000.0
    max_attempts_per_tick: 16

  epithelial: true
  epithelial_params:
    scan_threshold: 0.5
    max_hotspots: 6
    infection_intent_strength: 0.08

  dc: true
  dc_params:
    antigen_threshold: 0.5
    debris_threshold: 0.2
    il12_deposit_per_hotspot: 3.0
    deposit_cap: 12.0
    recruit_prob_per_hotspot: 0.9
    norm_score: 20.0
    max_hotspots: 8

  naive_tcell: true
  naive_tcell_params:
    cell_types: ["Naive_CD4", "Naive_CD8"]
    affinity_threshold: 0.25
    percell_precedence: true
    percell:
      Th2:
        decision_latency_ticks: 1

