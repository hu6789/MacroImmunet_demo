id: antigen_amplification_v1
name: "Antigen Amplification (v1)"
type: behavior
meta:
  description: "Simulate antigen amplification (abstract). Use with caution: intended for field-mode or specialized particle-mode."
  version: "1.0"
  created: 2025-11-04

target_field: "Field_Antigen_Density"

params:
  mode: "field"
  replication_rate_fold_per_tick: 1.15
  burst_yield_units: 50
  max_replication_ticks: 12
  host_required: false
  max_replication_per_cell_per_tick: 20
  saturation_K: 500.0
  safety_limits:
    max_spawn_per_tick_global: 1000

validate:
  required_params: ["replication_rate_fold_per_tick", "burst_yield_units", "safety_limits"]
  types:
    replication_rate_fold_per_tick: "float"
    burst_yield_units: "int"
    saturation_K: "float"
    mode: "string"

actions:
  - trigger:
      type: "time"
      condition: "ticks_since_last_replication >= 1"
    outcome:
      action: "replicate"
      effect: "amplify_antigen"
      target_field: "{{ target_field }}"
      replication_factor: "{{ params.replication_rate_fold_per_tick }}"
      burst_yield: "{{ params.burst_yield_units }}"
      max_ticks: "{{ params.max_replication_ticks }}"

implementation:
  module: "behaviors_impl.antigen_amplification"
  function: "antigen_amplification_v1"
  args:
    params_ref: params
    target_field_ref: target_field

notes:
  - "If you use this behavior in field-mode, ensure the engine applies saturation_K to avoid runaway growth."
  - "Prefer per-cell intracellular replication using antigen_replication_v1 for biologically plausible dynamics."

