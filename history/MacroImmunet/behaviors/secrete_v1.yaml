id: secrete_v1
type: behavior
meta:
  description: "Emit a field secretion intent for a specified molecule for a duration."
  version: "1.0"

params:
  molecule: null
  rate_per_tick: 0.1
  duration_ticks: 24

actions:
  - trigger:
      type: "on_intent"
      intent: "secrete"
    outcome:
      action: "secrete_field"
      payload:
        molecule: "{{ payload.molecule or params.molecule }}"
        rate_per_tick: "{{ payload.rate_per_tick or params.rate_per_tick }}"
        duration_ticks: "{{ payload.duration_ticks or params.duration_ticks }}"

notes:
  - "Engine should implement secrete intent by adding to field per tick for duration or schedule emission events."

# --- explicit implementation block so behavior_factory will import the impl directly ---
implementation:
  module: "behaviors_impl.secrete"
  function: "secrete_v1"

# implementation_hint left for humans (optional)
implementation_hint:
  recommended: "behaviors_impl.secrete.secrete_v1"

